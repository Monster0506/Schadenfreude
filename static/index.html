<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="lobby-inner">
    <div id="lobby-title">TETRIS</div>
    <div id="lobby-join">
      <input id="room-input" placeholder="room code" maxlength="12" autocomplete="off" spellcheck="false" />
      <button id="join-btn">JOIN</button>
    </div>
    <div class="lobby-sep">or</div>
    <button id="create-btn">CREATE ROOM</button>
  </div>
  <script>
    function randCode() {
      const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
      return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
    }
    function go(code) {
      location.href = '/game.html?room=' + code.toLowerCase().trim();
    }
    document.getElementById('create-btn').addEventListener('click', () => go(randCode()));
    document.getElementById('join-btn').addEventListener('click', () => {
      const v = document.getElementById('room-input').value.trim();
      if (v) go(v);
    });
    document.getElementById('room-input').addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.value.trim()) go(e.target.value.trim());
    });
  </script>
</body>
</html>
